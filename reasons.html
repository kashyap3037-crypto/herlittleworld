<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>For You ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="reasons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background -->
    <div class="bg"></div>

    <section class="container">

        <!-- Photo Frame -->
        <div class="photo-stack">

            <div class="photo rotate1">
                <img src="images/look.jpeg">
            </div>

            <div class="photo rotate2">
                <img src="images/battery.jpeg">
            </div>

            <div class="photo main">
                <img src="images/flower.jpeg">
                <p>Beautiful Moment ❤️</p>
            </div>

            <div class="photo rotate3">
                <img src="images/jumka.jpeg">
            </div>

            <div class="photo rotate4">
                <img src="images/smile.jpeg">
            </div>

        </div>

        <!-- Text BELOW frame -->
        <h1 class="title">Just a few glimpses of you 📸</h1>
        <h2 class="title">Dobby The Elf 🪄</h2>
        <p class="description">You are the most precious person in my life, and every day with you feels like a
            beautiful dream. Thank you for being exactly who you are.</p>

        <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
            <button onclick="window.location.href='index.html'" class="back-btn"
                style="padding: 10px 20px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer;">Home
                🏠</button>
            <button onclick="window.location.href='grid.html'" class="next-btn"
                style="padding: 10px 30px; border-radius: 20px; border: none; background: linear-gradient(45deg, #2b2fd6, #f472b6); color: white; cursor: pointer; font-weight: 500;">See
                Memories ✨</button>
        </div>

    </section>

    <script src="reasons.js"></script>
</body>

</html>
