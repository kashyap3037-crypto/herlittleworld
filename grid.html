<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Memories 📸</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="grid.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Dancing+Script:wght@600&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="page">
        <h1>Not every moment looks special… but some stay forever❤️</h1>

        <!-- 🔥 MOBILE FIXED NAV -->
        <div class="mobile-swiper-nav">
            <button class="swiper-btn prev" onclick="prevCard()">‹</button>
            <button class="swiper-btn next" onclick="nextCard()">›</button>
        </div>

        <div class="photo-grid">

            <div class="photo-card" onclick="openModal(1)">
                <img src="images/flower.jpeg">
            </div>

            <div class="photo-card" onclick="openModal(2)">
                <img src="images/jumka.jpeg">
            </div>

            <div class="photo-card" onclick="openModal(3)">
                <img src="images/food.jpeg">
            </div>

            <div class="photo-card" onclick="openModal(4)">
                <img src="images/smile.jpeg">
            </div>

        </div>

        <!-- Message -->
        <div class="text-container">
            <p id="message">Click to see a memory…</p>
            <div id="final" class="final">
                You don’t even realize how special these moments are… ❤️
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-buttons">
            <button onclick="window.location.href='reasons.html'" class="btn">← Back</button>
            <button onclick="window.location.href='index.html'" class="btn">Home ❤️</button>
            <button onclick="window.location.href='music.html'" class="btn btn-primary">Next ✨</button>
        </div>
    </div>

    <!-- Memory Modal -->
    <div id="memoryModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-image">
                <img id="modalImg" src="" alt="Memory">
            </div>
            <div class="modal-info">
                <h2 id="modalTitle">Memory</h2>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script src="grid.js"></script>
</body>

</html>
