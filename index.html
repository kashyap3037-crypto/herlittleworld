<!DOCTYPE html>
<html lang="en">

<head>

    <title>For You ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background Glow -->
    <div class="bg-blob1"></div>
    <div class="bg-blob2"></div>

    <section class="hero">
        <div class="hero-text">
            <h1>
                Some people don’t realize how
                <span class="highlight">special</span> they are…<br>

            </h1>

            <p>Maybe you don’t even realize how special you truly are…</p>

            <button onclick="enterWorld()">Enter Her World ✨</button>
        </div>

        <div class="hero-img">
            <img src="images/home.jpeg" alt="her">
        </div>
    </section>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mp3">
    </audio>

    <script src="script.js"></script>
</body>

</html>
